<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fishbowl Game</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero card">
        <div>
          <p class="eyebrow">🐟 Fishbowl party game</p>
          <h1>Draw a topic, start a conversation, and keep track of what is left.</h1>
          <p class="hero-copy">Set up approved topics once, then let the host draw, discuss, skip, and finish each prompt.</p>
        </div>
        <button class="ghost" id="reset-button">↻ Reset</button>
      </section>
      <section class="scoreboard" id="scoreboard"></section>
      <section id="game-view"></section>
    </main>
    <script src="src/app.js"></script>
  </body>
</html>
