<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topic Draw</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero card">
        <div>
          <p class="eyebrow">💬 Anonymous topic bowl</p>
          <h1>Collect anonymous questions, then draw one at random.</h1>
          <p class="hero-copy">Create a live session, share the QR code, let participants submit topics from their phones, and guide the room through a fair discussion draw.</p>
        </div>
        <button class="ghost" id="home-button">Host home</button>
      </section>
      <section id="app-status" class="status" role="status"></section>
      <section id="app-view"></section>
    </main>
    <script src="src/app.js"></script>
  </body>
</html>
